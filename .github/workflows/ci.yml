name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "dev-ledger/**"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore: ["**.md", "dev-ledger/**"]

# Supersede in-flight runs when an agent pushes again to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Skip while a PR is a draft; always run on pushes to main.
    if: ${{ github.event_name == 'push' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # This repo is scripts, not a package: pull the sibling SDK + orchestrator
      # from the same owner (not on PyPI), plus the test/lint tools.
      - name: Install
        run: |
          pip install "my-things-core @ git+https://github.com/${{ github.repository_owner }}/my-things-core@main"
          # --no-deps: its only dep is the core installed above, but its main
          # still names it "mythings-core" (pre-rename) which pip can't resolve.
          pip install --no-deps "my-orchestrator @ git+https://github.com/${{ github.repository_owner }}/my-orchestrator@main"
          # merge_ready_prs.py routes every merge through MyGuard's pr-merge ASK
          # rule, so the guard is a real dependency of this repo's scripts now.
          pip install --no-deps "my-guard @ git+https://github.com/${{ github.repository_owner }}/my-guard@main"
          # notify_usage.py / notify_systemd_status.py import mytelegrambot.transport;
          # --no-deps for the same pre-rename-metadata reason as my-orchestrator.
          pip install --no-deps "my-telegram-bot @ git+https://github.com/${{ github.repository_owner }}/my-telegram-bot@main"
          pip install pytest ruff
      - name: Ruff
        run: ruff check merge_ready_prs.py merge_order_prs.py fleet_ask.py fleet_dispatch.py fleet_cycle.py fleet_test.py fleet_usage.py account_usage.py cycle_driver.py study_cycle.py notify_usage.py notify_systemd_status.py conftest.py test_merge_ready_prs.py test_merge_order_prs.py test_fleet_ask.py test_fleet_dispatch.py test_fleet_cycle.py test_fleet_test.py test_account_usage.py test_cycle_driver.py test_study_cycle.py test_notify_usage.py test_notify_systemd_status.py test_integration_reporter.py
      # test_integration_reporter.py is deliberately absent: it needs sibling
      # checkouts (run locally via fleet_test.py --include-slow).
      - name: Tests
        run: pytest test_merge_ready_prs.py test_merge_order_prs.py test_fleet_ask.py test_fleet_dispatch.py test_fleet_cycle.py test_fleet_test.py test_account_usage.py test_cycle_driver.py test_study_cycle.py test_notify_usage.py test_notify_systemd_status.py
